async function seed() {
  document.getElementById('status').textContent = 'Seeding menu... please wait';
  let count = 0;
  for (const item of menuItems) {
    await db.collection('rv_restaurantMenu').add({
      ...item,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    count++;
    document.getElementById('status').textContent = `Saved ${count}/${menuItems.length} items...`;
  }
  document.getElementById('status').textContent = `✅ Done! ${count} menu items saved. You can close this tab now.`;
}
